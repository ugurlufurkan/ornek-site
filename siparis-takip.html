<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kavrulmuş sipariş takip — KVR numaranızla sipariş durumunuzu sorgulayın.">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <title>Sipariş Takip | Kavrulmuş</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/account-menu.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .track-section { max-width: 560px; margin: 0 auto; padding: 40px 5% 80px; }
        .track-form { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
        .track-form input { flex: 1; min-width: 200px; padding: 14px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: var(--text-light); font-family: var(--font-body); }
        body.light-mode .track-form input { background: #fff; color: #1A1512; border-color: rgba(0,0,0,0.15); }
        #track-result { margin-top: 24px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-brand"><a href="index.html" style="color:inherit;display:flex;align-items:center;">Kavrulmuş<span>.</span></a></div>
        <ul class="nav-links">
            <li><a href="index.html">Anasayfa</a></li>
            <li><a href="urunler.html">Ürünlerimiz</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
            <li><a href="siparis-takip.html" style="color:var(--gold-accent);">Sipariş Takip</a></li>
        </ul>
        <div class="nav-actions">
            <button id="theme-toggle" class="btn-text" title="Tema değiştir">☀️</button>
            <div class="account-menu" id="account-menu">
                <button id="open-auth" class="btn-text">👤 Giriş Yap</button>
                <div class="account-dropdown" id="account-dropdown">
                    <a href="hesabim.html">👤 Hesabım</a>
                    <a href="favoriler.html">❤️ Favoriler</a>
                    <a href="#" id="account-logout-link" class="logout-link">🚪 Çıkış Yap</a>
                </div>
            </div>
            <a href="favoriler.html" class="nav-icon favorite-nav">❤️<span class="favorite-count" id="favorite-count">0</span></a>
            <button class="btn-premium cart-btn" id="cart-icon">🛒 Sepet (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <header class="page-header">
        <h1>Sipariş Takip</h1>
        <p>Sipariş onay e-postanızdaki <strong>KVR-XXXX</strong> numarasını girerek durumu öğrenin.</p>
    </header>

    <section class="track-section">
        <form id="track-form" class="track-form">
            <input type="text" id="track-no" placeholder="Örn: KVR-1234" pattern="KVR-\d{4}" required>
            <button type="submit" class="btn-premium primary">Sorgula</button>
        </form>
        <div id="track-result"></div>
    </section>

    <footer class="premium-footer">
        <div class="footer-bottom"><p>&copy; 2026 Kavrulmuş Kahve — Tüm hakları saklıdır.</p></div>
    </footer>

    <div id="toast-container" class="toast-container"></div>
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-box">
            <span class="close-modal" id="close-auth">&times;</span>
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Giriş Yap</button>
                <button class="auth-tab" id="tab-register">Kayıt Ol</button>
            </div>
            <form id="login-form" class="modal-form active">
                <input type="email" placeholder="E-Posta" required>
                <input type="password" placeholder="Şifre" required>
                <button type="submit" class="btn-premium primary" style="width:100%;margin-top:10px;">Giriş Yap</button>
            </form>
            <form id="register-form" class="modal-form">
                <input type="text" placeholder="Ad Soyad" required>
                <input type="tel" placeholder="Telefon" required>
                <input type="email" placeholder="E-Posta" required>
                <input type="password" placeholder="Şifre" required>
                <button type="submit" class="btn-premium primary" style="width:100%;margin-top:10px;">Kayıt Ol</button>
            </form>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/store-ui.js"></script>
    <script src="js/order-track.js"></script>
</body>
</html>
