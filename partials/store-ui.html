<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header"><h2>Sepetiniz</h2><button class="close-cart" id="close-cart" type="button">✕</button></div>
    <div class="cart-items" id="cart-items"></div>
    <div class="cart-footer">
        <div class="cart-total-box"><span>Ara Toplam:</span><span><span id="cart-total">0.00</span> TL</span></div>
        <button class="btn-premium primary checkout-btn" id="go-to-checkout" type="button">Siparişi Tamamla</button>
    </div>
</aside>
<div class="modal-overlay" id="checkout-modal">
    <div class="modal-box" style="max-width: 500px;">
        <span class="close-modal close-modal-btn">&times;</span>
        <h2 style="color:var(--gold-accent); margin-bottom:20px;">Güvenli Ödeme</h2>
        <form id="checkout-form" class="modal-form active">
            <input type="text" id="checkout-name" placeholder="Ad Soyad" required>
            <input type="tel" id="checkout-phone" placeholder="Telefon (05XX...)" required>
            <textarea id="checkout-address" rows="3" placeholder="Teslimat Adresi" required></textarea>
            <select id="odeme-yontemi-select" required>
                <option value="">Ödeme Yöntemi Seçin</option>
                <option value="card">Kredi/Banka Kartı</option>
                <option value="door">Kapıda Ödeme</option>
            </select>
            <div id="card-fields" class="hidden">
                <input type="text" id="card-number" placeholder="Kart Numarası" inputmode="numeric" autocomplete="off">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="card-expiry" placeholder="AA/YY" inputmode="numeric" autocomplete="off" style="flex:1;">
                    <input type="text" id="card-cvv" placeholder="CVV" inputmode="numeric" autocomplete="off" style="flex:1;">
                </div>
                <p style="font-size:0.75rem; color:#888; margin-top:-10px; margin-bottom:15px;">🔒 Demo ödeme — kart bilgileriniz kaydedilmez.</p>
            </div>
            <button type="submit" class="btn-premium primary" style="width:100%; margin-top:10px;">Siparişi Onayla</button>
        </form>
    </div>
</div>
<div class="modal-overlay" id="tracking-modal">
    <div class="modal-box" style="max-width: 500px;">
        <span class="close-modal close-modal-btn">&times;</span>
        <h2 style="color:var(--gold-accent); margin-bottom:10px;">Siparişiniz Alındı!</h2>
        <p style="margin-bottom:20px; color:#999;">Takip numaranız: <strong id="tracking-order-no">#KVR-0000</strong></p>
        <div class="progress-bar-bg"><div class="progress-fill" id="track-progress"></div></div>
    </div>
</div>
