<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorilerim | Kavrulmuş</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/account-menu.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <a href="index.html" style="display:flex;align-items:center;color:inherit;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg>
                Kavrulmuş<span>.</span>
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Anasayfa</a></li>
            <li><a href="hakkimizda.html">Hakkımızda</a></li>
            <li><a href="urunler.html">Ürünlerimiz</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
        </ul>
        <div class="nav-actions">
            <div class="account-menu" id="account-menu">
                <button id="open-auth" class="btn-text">👤 Giriş Yap</button>
                <div class="account-dropdown" id="account-dropdown">
                    <a href="hesabim.html" id="account-profile-link">👤 Hesabım</a>
                    <a href="favoriler.html" id="account-favorites-link">❤️ Favoriler</a>
                    <a href="#" id="account-logout-link" class="logout-link">🚪 Çıkış Yap</a>
                </div>
            </div>
            <a href="favoriler.html" class="nav-icon favorite-nav">❤️<span class="favorite-count" id="favorite-count">0</span></a>
            <button class="btn-premium cart-btn" id="cart-icon">🛒 Sepet (<span id="cart-count">0</span>)</button>
        </div>
    </nav>
    <section class="products-section" style="margin-top: 100px;">
        <div class="section-header">
            <h2>❤️ Favorilerim</h2>
            <p>Beğendiğin kahveler burada.</p>
        </div>
        <div class="products-grid" id="favorites-grid"></div>
    </section>

    <div class="cart-overlay" id="cart-overlay"></div>
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header"><h2>Sepetiniz</h2><button class="close-cart" id="close-cart">✕</button></div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total-box"><span>Ara Toplam:</span><span><span id="cart-total">0.00</span> TL</span></div>
            <button class="btn-premium primary checkout-btn" id="go-to-checkout">Siparişi Tamamla</button>
        </div>
    </aside>
    <div id="toast-container" class="toast-container"></div>
    <div class="modal-overlay" id="auth-modal">
        <div class="modal-box">
            <span class="close-modal" id="close-auth">&times;</span>
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Giriş Yap</button>
                <button class="auth-tab" id="tab-register">Kayıt Ol</button>
            </div>
            <form id="login-form" class="modal-form active">
                <input type="email" placeholder="E-Posta Adresiniz" required>
                <input type="password" placeholder="Şifreniz" required>
                <button type="submit" class="btn-premium primary" style="width:100%; margin-top:10px;">Giriş Yap</button>
            </form>
            <form id="register-form" class="modal-form">
                <input type="text" placeholder="Ad Soyad" required>
                <input type="tel" placeholder="Telefon" required>
                <input type="email" placeholder="E-Posta Adresiniz" required>
                <input type="password" placeholder="Şifreniz (min. 6 karakter)" required minlength="6">
                <button type="submit" class="btn-premium primary" style="width:100%; margin-top:10px;">Kayıt Ol</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="checkout-modal">
        <div class="modal-box" style="max-width: 500px;">
            <span class="close-modal close-modal-btn">&times;</span>
            <h2 style="color:var(--gold-accent); margin-bottom:20px;">Güvenli Ödeme</h2>
            <form id="checkout-form" class="modal-form active">
                <input type="text" id="checkout-name" placeholder="Ad Soyad" required>
                <input type="tel" id="checkout-phone" placeholder="Telefon (05XX...)" required>
                <textarea id="checkout-address" rows="3" placeholder="Teslimat Adresi" required></textarea>
                <select id="odeme-yontemi-select" required>
                    <option value="">Ödeme Yöntemi Seçin</option>
                    <option value="card">Kredi/Banka Kartı</option>
                    <option value="door">Kapıda Ödeme</option>
                </select>
                <button type="submit" class="btn-premium primary" style="width:100%; margin-top:10px;">Siparişi Onayla</button>
            </form>
        </div>
    </div>
    <div class="modal-overlay" id="tracking-modal">
        <div class="modal-box" style="max-width: 500px;">
            <span class="close-modal close-modal-btn">&times;</span>
            <h2 style="color:var(--gold-accent); margin-bottom:10px;">Siparişiniz Alındı!</h2>
            <p style="margin-bottom:20px; color:#999;">Takip numaranız: <strong id="tracking-order-no">#KVR-0000</strong></p>
            <div class="progress-bar-bg"><div class="progress-fill" id="track-progress"></div></div>
        </div>
    </div>

    <script src="js/toast.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/favorites-page.js"></script>
    <script src="js/tracking.js"></script>
</body>
</html>
