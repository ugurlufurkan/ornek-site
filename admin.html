<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici Paneli | Kavrulmuş</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/toast.css">
    <style>
        .admin-container { max-width: 800px; margin: 120px auto 50px; padding: 40px; background: #1a1a1a; border-radius: 15px; border: 1px solid var(--gold-accent); }
        .admin-header { text-align: center; margin-bottom: 30px; }
        .admin-header h1 { color: var(--gold-accent); font-family: var(--font-heading); }
        .admin-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: var(--text-light); font-weight: 600; }
        .form-group input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-family: var(--font-body); outline: none; }
        .form-group input:focus { border-color: var(--gold-accent); }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <span style="color: var(--gold-accent);">🛡️ Admin Kontrol Paneli</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">← Siteye Dön</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1>Sisteme Yeni Kahve Ekle</h1>
            <p style="color: #999;">Buradan eklediğiniz ürünler anında vitrine ve veritabanına yansır.</p>
        </div>

        <form id="admin-add-product" class="admin-form">
            <div class="form-group">
                <label>Kahve Başlığı (Örn: Guatemala Antigua)</label>
                <input type="text" id="p-title" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Kahve Türü / Açıklama (Örn: %100 Arabica - Orta Kavrum)</label>
                <input type="text" id="p-type" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>Fiyat (TL) (Sadece Rakam)</label>
                <input type="number" id="p-price" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>Resim Linki (URL)</label>
                <input type="text" id="p-image" placeholder="https://images.unsplash.com/photo-..." required autocomplete="off">
            </div>

            <button type="submit" class="btn-premium primary" style="padding: 15px; font-size: 1.1rem; margin-top: 10px;">💾 Ürünü Veritabanına Kaydet</button>
        </form>
    </div>

    <div id="toast-container" class="toast-container"></div>
    
    <script src="js/toast.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
