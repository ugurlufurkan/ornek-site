services:
  veritabani:
    image: postgres:15-alpine
    container_name: kavrulmus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-patron}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-kavrulmus_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-patron} -d ${DB_NAME:-kavrulmus_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  uygulama:
    build: .
    container_name: kavrulmus_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: veritabani
    depends_on:
      veritabani:
        condition: service_healthy

volumes:
  pgdata:
